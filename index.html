<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChudChat2</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #00ff88;
    --accent2: #ff3366;
    --accent3: #7b5cff;
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --online: #00ff88;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  /* Gradient blob */
  body::after {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(123,92,255,0.08) 0%, transparent 70%);
    top: -200px; right: -200px;
    pointer-events: none;
    z-index: 0;
  }

  /* ============ ENTRY SCREEN ============ */
  #entry {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    gap: 0;
  }

  .entry-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(64px, 12vw, 120px);
    letter-spacing: 6px;
    line-height: 0.9;
    text-align: center;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent3) 50%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: logoGlow 3s ease-in-out infinite alternate;
    margin-bottom: 8px;
  }

  @keyframes logoGlow {
    from { filter: drop-shadow(0 0 20px rgba(0,255,136,0.3)); }
    to   { filter: drop-shadow(0 0 40px rgba(123,92,255,0.6)); }
  }

  .entry-tagline {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 48px;
  }

  .entry-form {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 320px;
  }

  .entry-form input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 14px 20px;
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    outline: none;
    border-radius: 4px;
    transition: border-color 0.2s, box-shadow 0.2s;
    text-align: center;
    letter-spacing: 2px;
  }

  .entry-form input::placeholder { color: var(--muted); letter-spacing: 1px; }

  .entry-form input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,255,136,0.1);
  }

  .btn-enter {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 14px 20px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    cursor: pointer;
    border-radius: 4px;
    transition: transform 0.1s, box-shadow 0.2s;
  }

  .btn-enter:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 30px rgba(0,255,136,0.4);
  }

  .btn-enter:active { transform: translateY(0); }

  .entry-note {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-top: 12px;
    font-family: 'Space Mono', monospace;
    line-height: 1.6;
  }

  /* ============ MAIN LAYOUT ============ */
  #app {
    display: none;
    height: 100vh;
    grid-template-columns: 240px 1fr;
    grid-template-rows: 56px 1fr;
    position: relative;
    z-index: 1;
  }

  #app.visible { display: grid; }

  /* Header */
  header {
    grid-column: 1 / -1;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    position: relative;
  }

  .header-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-divider {
    width: 1px; height: 24px;
    background: var(--border);
  }

  .header-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .pulse-dot {
    width: 8px; height: 8px;
    background: var(--online);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(0,255,136,0.4); }
    50% { box-shadow: 0 0 0 6px rgba(0,255,136,0); }
  }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .my-nick {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    background: rgba(0,255,136,0.08);
    padding: 4px 10px;
    border-radius: 3px;
    border: 1px solid rgba(0,255,136,0.2);
  }

  /* Sidebar */
  aside {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* Games panel */
  .games-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .game-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    border-radius: 4px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: all 0.15s;
    text-align: left;
  }

  .game-btn:hover {
    border-color: var(--accent3);
    background: rgba(123,92,255,0.1);
    transform: translateX(2px);
  }

  .game-icon { font-size: 18px; }

  /* Users list */
  #users-list {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }

  .user-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    font-size: 13px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .user-avatar {
    width: 28px; height: 28px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    color: #000;
    flex-shrink: 0;
  }

  .user-name { font-size: 13px; }
  .user-name.is-me { color: var(--accent); }

  /* ============ CHAT AREA ============ */
  main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    gap: 12px;
    padding: 6px 8px;
    border-radius: 4px;
    transition: background 0.1s;
    animation: msgIn 0.2s ease-out;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg:hover { background: rgba(255,255,255,0.03); }

  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    color: #000;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg-body { flex: 1; min-width: 0; }

  .msg-header {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 3px;
  }

  .msg-name {
    font-weight: 600;
    font-size: 14px;
  }

  .msg-time {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  .msg-text {
    font-size: 14px;
    line-height: 1.5;
    color: #cccce0;
    word-break: break-word;
  }

  /* System messages */
  .msg-system {
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    padding: 8px;
  }

  /* Game messages */
  .msg-game {
    background: rgba(123,92,255,0.06);
    border: 1px solid rgba(123,92,255,0.2);
    border-radius: 8px;
    padding: 12px 16px;
    margin: 4px 0;
    font-size: 13px;
  }

  .msg-game .game-header {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    color: var(--accent3);
    margin-bottom: 8px;
  }

  /* Input bar */
  .input-bar {
    padding: 16px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
  }

  #msg-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    border-radius: 4px;
    transition: border-color 0.2s, box-shadow 0.2s;
    resize: none;
    height: 44px;
    line-height: 20px;
  }

  #msg-input::placeholder { color: var(--muted); }

  #msg-input:focus {
    border-color: var(--accent3);
    box-shadow: 0 0 0 3px rgba(123,92,255,0.1);
  }

  .btn-send {
    background: var(--accent3);
    color: #fff;
    border: none;
    width: 44px; height: 44px;
    font-size: 18px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .btn-send:hover {
    background: #9575ff;
    transform: scale(1.05);
  }

  /* ============ MODAL ============ */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 440px;
    max-width: 95vw;
    max-height: 80vh;
    overflow-y: auto;
    padding: 24px;
    animation: modalIn 0.2s ease-out;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.96) translateY(10px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    color: var(--accent3);
    margin-bottom: 16px;
  }

  .modal-body { font-size: 14px; line-height: 1.6; color: #aaa; }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    flex-wrap: wrap;
  }

  .btn-modal {
    padding: 10px 20px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-modal.primary { background: var(--accent); color: #000; }
  .btn-modal.secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-modal.danger { background: var(--accent2); color: #fff; }

  .btn-modal:hover { transform: translateY(-1px); filter: brightness(1.1); }

  /* Game-specific styles */
  .trivia-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 12px;
  }

  .trivia-opt {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    font-size: 13px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
    text-align: left;
  }

  .trivia-opt:hover { border-color: var(--accent3); background: rgba(123,92,255,0.15); }
  .trivia-opt.correct { border-color: var(--accent); background: rgba(0,255,136,0.15); color: var(--accent); }
  .trivia-opt.wrong { border-color: var(--accent2); background: rgba(255,51,102,0.15); color: var(--accent2); }

  .poll-options { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }

  .poll-opt {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 12px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .poll-opt:hover:not(.voted) { border-color: var(--accent3); }

  .poll-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    background: rgba(123,92,255,0.15);
    transition: width 0.4s ease;
    pointer-events: none;
  }

  .poll-label { position: relative; z-index: 1; }
  .poll-count { position: relative; z-index: 1; font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }

  .wd-display {
    font-family: 'Space Mono', monospace;
    font-size: 28px;
    letter-spacing: 12px;
    color: var(--accent);
    text-align: center;
    margin: 16px 0;
  }

  .wd-input-row { display: flex; gap: 8px; margin-top: 12px; }

  .wd-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    outline: none;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .wd-input:focus { border-color: var(--accent); }

  .wd-guesses { margin-top: 12px; display: flex; flex-direction: column; gap: 4px; }

  .wd-guess-row { display: flex; gap: 4px; justify-content: center; }

  .wd-cell {
    width: 36px; height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    border-radius: 3px;
    border: 1px solid var(--border);
  }

  .wd-cell.hit { background: rgba(0,255,136,0.25); border-color: var(--accent); color: var(--accent); }
  .wd-cell.close { background: rgba(255,185,0,0.2); border-color: #ffb900; color: #ffb900; }
  .wd-cell.miss { background: rgba(255,255,255,0.05); color: var(--muted); }

  /* Scrollbar */
  .modal::-webkit-scrollbar { width: 4px; }
  .modal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Responsive */
  @media (max-width: 600px) {
    #app.visible { grid-template-columns: 1fr; }
    aside { display: none; }
  }
</style>
</head>
<body>

<!-- ENTRY SCREEN -->
<div id="entry">
  <div class="entry-logo">ChudChat<span style="color:#ff3366">2</span></div>
  <div class="entry-tagline">ephemeral · no logs · disappears when empty</div>
  <div class="entry-form">
    <input type="text" id="nick-input" placeholder="your nickname" maxlength="20" autocomplete="off" />
    <button class="btn-enter" onclick="enterChat()">ENTER THE VOID</button>
  </div>
  <div class="entry-note">⚡ No accounts. No history.<br>All messages vanish when everyone leaves.</div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="header-logo">ChudChat2</div>
    <div class="header-divider"></div>
    <div class="header-status">
      <div class="pulse-dot"></div>
      <span id="online-count">1 online</span>
    </div>
    <div class="header-right">
      <span class="my-nick" id="my-nick-display"></span>
    </div>
  </header>

  <aside>
    <div class="sidebar-section">
      <div class="sidebar-label">Mini Games</div>
      <div class="games-list">
        <button class="game-btn" onclick="launchGame('trivia')"><span class="game-icon">🧠</span> Trivia Drop</button>
        <button class="game-btn" onclick="launchGame('poll')"><span class="game-icon">📊</span> Quick Poll</button>
        <button class="game-btn" onclick="launchGame('wordguess')"><span class="game-icon">🔤</span> Word Guess</button>
        <button class="game-btn" onclick="launchGame('rps')"><span class="game-icon">✊</span> Rock Paper Scissors</button>
        <button class="game-btn" onclick="launchGame('bomb')"><span class="game-icon">💣</span> Bomb Pass</button>
      </div>
    </div>
    <div class="sidebar-label" style="padding:16px 16px 8px;">Online</div>
    <div id="users-list"></div>
  </aside>

  <main>
    <div id="messages">
      <div class="msg-system">⚡ Welcome to ChudChat2 — messages disappear when everyone leaves</div>
    </div>
    <div class="input-bar">
      <input type="text" id="msg-input" placeholder="say something..." maxlength="500" autocomplete="off" />
      <button class="btn-send" onclick="sendMessage()">➤</button>
    </div>
  </main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modal">
    <div class="modal-title" id="modal-title">Game</div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<script>
// ===================== STATE =====================
const SESSION_ID = Math.random().toString(36).slice(2, 10);
let myNick = '';
let myColor = '';
const COLORS = ['#00ff88','#ff3366','#7b5cff','#ff9500','#00d4ff','#ff6ec7','#aaff00','#ff4500'];

// BroadcastChannel for cross-tab communication
const bc = new BroadcastChannel('chudchat2');

// In-memory state (shared via BroadcastChannel)
let users = {}; // { sessionId: { nick, color, lastSeen } }
let messages = []; // shared chat history (in-memory)
let gameState = {}; // active game state

// ===================== ENTRY =====================
document.getElementById('nick-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') enterChat();
});

function enterChat() {
  const raw = document.getElementById('nick-input').value.trim();
  if (!raw) {
    document.getElementById('nick-input').focus();
    document.getElementById('nick-input').style.borderColor = '#ff3366';
    return;
  }
  myNick = raw.slice(0, 20);
  myColor = COLORS[Math.floor(Math.random() * COLORS.length)];

  document.getElementById('entry').style.opacity = '0';
  document.getElementById('entry').style.transition = 'opacity 0.4s';
  setTimeout(() => {
    document.getElementById('entry').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    document.getElementById('my-nick-display').textContent = myNick;
  }, 400);

  // Announce join
  announce({ type: 'join', nick: myNick, color: myColor });
  // Request state sync from others
  bc.postMessage({ type: 'reqSync', from: SESSION_ID });
  
  renderUsers();
  setupHeartbeat();

  document.getElementById('msg-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
}

// ===================== BROADCAST =====================
function announce(payload) {
  users[SESSION_ID] = { nick: myNick, color: myColor, lastSeen: Date.now() };
  bc.postMessage({ ...payload, sessionId: SESSION_ID, nick: myNick, color: myColor, ts: Date.now() });
}

bc.onmessage = (e) => {
  const d = e.data;
  if (!d || d.sessionId === SESSION_ID) return;

  if (d.type === 'join') {
    users[d.sessionId] = { nick: d.nick, color: d.color, lastSeen: Date.now() };
    addSystemMsg(`${d.nick} joined`);
    renderUsers();
    // Send them our state
    bc.postMessage({ type: 'syncState', to: d.sessionId, from: SESSION_ID, messages, users, gameState });
  }

  else if (d.type === 'reqSync') {
    bc.postMessage({ type: 'syncState', to: d.from, from: SESSION_ID, messages, users, gameState });
  }

  else if (d.type === 'syncState' && d.to === SESSION_ID) {
    // Merge users
    Object.assign(users, d.users || {});
    users[SESSION_ID] = { nick: myNick, color: myColor, lastSeen: Date.now() };
    // Merge messages (deduplicate by id)
    const existingIds = new Set(messages.map(m => m.id));
    (d.messages || []).forEach(m => { if (!existingIds.has(m.id)) messages.push(m); });
    messages.sort((a, b) => a.ts - b.ts);
    if (d.gameState && d.gameState.active) gameState = d.gameState;
    renderAllMessages();
    renderUsers();
  }

  else if (d.type === 'chat') {
    users[d.sessionId] = { nick: d.nick, color: d.color, lastSeen: Date.now() };
    const msg = { id: d.id, nick: d.nick, color: d.color, text: d.text, ts: d.ts };
    messages.push(msg);
    appendMessage(msg);
    renderUsers();
  }

  else if (d.type === 'leave') {
    const u = users[d.sessionId];
    if (u) {
      addSystemMsg(`${u.nick} left`);
      delete users[d.sessionId];
      renderUsers();
    }
  }

  else if (d.type === 'heartbeat') {
    if (users[d.sessionId]) {
      users[d.sessionId].lastSeen = Date.now();
    } else {
      users[d.sessionId] = { nick: d.nick, color: d.color, lastSeen: Date.now() };
    }
    renderUsers();
  }

  else if (d.type === 'game') {
    handleIncomingGame(d);
  }
};

// ===================== HEARTBEAT & CLEANUP =====================
function setupHeartbeat() {
  setInterval(() => {
    announce({ type: 'heartbeat' });
    // Remove stale users
    const now = Date.now();
    let changed = false;
    Object.keys(users).forEach(sid => {
      if (sid !== SESSION_ID && now - users[sid].lastSeen > 8000) {
        const u = users[sid];
        addSystemMsg(`${u.nick} disconnected`);
        delete users[sid];
        changed = true;
      }
    });
    if (changed) renderUsers();
  }, 3000);
}

// Announce leave on close
window.addEventListener('beforeunload', () => {

});

// ===================== MESSAGING =====================
function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  const msg = {
    id: SESSION_ID + '_' + Date.now(),
    nick: myNick,
    color: myColor,
    text,
    ts: Date.now()
  };
  messages.push(msg);
  appendMessage(msg, true);
  bc.postMessage({ type: 'chat', ...msg, sessionId: SESSION_ID });
}

function appendMessage(msg, isMine = false) {
  const container = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'msg';

  const initials = msg.nick.slice(0, 2).toUpperCase();
  el.innerHTML = `
    <div class="msg-avatar" style="background:${msg.color}">${initials}</div>
    <div class="msg-body">
      <div class="msg-header">
        <span class="msg-name" style="color:${msg.color}">${escHtml(msg.nick)}</span>
        <span class="msg-time">${formatTime(msg.ts)}</span>
      </div>
      <div class="msg-text">${escHtml(msg.text)}</div>
    </div>
  `;
  container.appendChild(el);
  scrollToBottom();
}

function addSystemMsg(text) {
  const container = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'msg-system';
  el.textContent = `— ${text} —`;
  container.appendChild(el);
  scrollToBottom();
}

function renderAllMessages() {
  const container = document.getElementById('messages');
  container.innerHTML = '<div class="msg-system">⚡ Welcome to ChudChat2 — messages disappear when everyone leaves</div>';
  messages.forEach(m => appendMessage(m));
}

function scrollToBottom() {
  const c = document.getElementById('messages');
  c.scrollTop = c.scrollHeight;
}

// ===================== USERS =====================
function renderUsers() {
  const list = document.getElementById('users-list');

  { q: "What gas do plants absorb?", opts: ["Oxygen","Nitrogen","CO2","Hydrogen"], a: 2 },
  { q: "How many bones in the adult human body?", opts: ["196","206","216","226"], a: 1 },
  { q: "Who painted the Mona Lisa?", opts: ["Raphael","Van Gogh","da Vinci","Michelangelo"], a: 2 },
  { q: "What's the fastest land animal?", opts: ["Lion","Cheetah","Greyhound","Falcon"], a: 1 },
  { q: "What's the boiling point of water (°C)?", opts: ["90","95","100","105"], a: 2 },
  { q: "Which ocean is the largest?", opts: ["Atlantic","Indian","Arctic","Pacific"], a: 3 },

function launchGame(type) {

// --- TRIVIA ---
function startTrivia() {
  const q = TRIVIA_QUESTIONS[Math.floor(Math.random() * TRIVIA_QUESTIONS.length)];
  const gid = 'trivia_' + Date.now();
  const data = { type: 'game', game: 'trivia', gid, q, answers: {} };
  gameState = data;
  bc.postMessage({ ...data, sessionId: SESSION_ID, nick: myNick, color: myColor });
  renderTrivia(data, true);
}

function renderTrivia(data, isInitiator = false) {
  const myAnswered = data.answers && data.answers[SESSION_ID] !== undefined;

  // Post in chat
  postGameCard(`🧠 TRIVIA`, `<strong>${escHtml(data.q.q)}</strong>`, data.gid);

  showModal('🧠 TRIVIA DROP', `
    <p style="margin-bottom:12px;font-size:15px;">${escHtml(data.q.q)}</p>
    <div class="trivia-options" id="trivia-opts-${data.gid}">
      ${data.q.opts.map((o, i) => `<button class="trivia-opt" onclick="answerTrivia('${data.gid}',${i})" data-idx="${i}">${escHtml(o)}</button>`).join('')}
    </div>

}

function answerTrivia(gid, idx) {
  if (!gameState || gameState.gid !== gid) return;
  if (gameState.answers && gameState.answers[SESSION_ID] !== undefined) return;

  gameState.answers[SESSION_ID] = idx;
  bc.postMessage({ type: 'game', game: 'triviaAnswer', gid, idx, sessionId: SESSION_ID, nick: myNick, color: myColor });

  const correct = gameState.q.a;
  const opts = document.querySelectorAll(`#trivia-opts-${gid} .trivia-opt`);
  opts.forEach((el, i) => {
    el.disabled = true;
    if (i === correct) el.classList.add('correct');
    else if (i === idx && idx !== correct) el.classList.add('wrong');
  });
  const result = document.getElementById(`trivia-result-${gid}`);
  if (result) {
    result.textContent = idx === correct ? '✅ Correct!' : `❌ Wrong! Answer: ${gameState.q.opts[correct]}`;
    result.style.color = idx === correct ? '#00ff88' : '#ff3366';
  }
  addSystemMsg(`${myNick} answered the trivia`);
}

// --- WORD GUESS ---
function startWordGuess() {
  const word = WORD_LIST[Math.floor(Math.random() * WORD_LIST.length)];
  const gid = 'wg_' + Date.now();
  const data = { type: 'game', game: 'wordguess', gid, word, guesses: [], solved: false };
  gameState = data;
  bc.postMessage({ ...data, sessionId: SESSION_ID, nick: myNick, color: myColor });
  renderWordGuess(data);
}

function renderWordGuess(data) {
  postGameCard('🔤 WORD GUESS', `Guess the ${data.word.length}-letter word!`, data.gid);
  updateWordGuessModal(data);
}

function updateWordGuessModal(data) {
  const guesses = data.guesses || [];
  const solved = data.solved;
  const len = data.word.length;

  let guessHTML = guesses.map(g => {
    let row = '';
    for (let i = 0; i < len; i++) {
      let cls = 'miss';
      if (g[i] === data.word[i]) cls = 'hit';
      else if (data.word.includes(g[i])) cls = 'close';
      row += `<div class="wd-cell ${cls}">${g[i]}</div>`;
    }
    return `<div class="wd-guess-row">${row}</div>`;
  }).join('');

  // Empty remaining rows
  for (let i = guesses.length; i < 6; i++) {
    guessHTML += `<div class="wd-guess-row">${Array(len).fill('<div class="wd-cell"></div>').join('')}</div>`;
  }

  const hint = solved ? `🎉 Solved! Word was: <strong style="color:var(--accent)">${data.word}</strong>` :
    guesses.length >= 6 ? `😞 Out of guesses! Word was: <strong style="color:var(--accent2)">${data.word}</strong>` :
    `Guess ${guesses.length + 1}/6 — Green = right spot, Yellow = wrong spot`;

  showModal('🔤 WORD GUESS', `
    <div class="wd-display">${'_ '.repeat(len).trim()}</div>
    <p style="font-size:12px;color:var(--muted);text-align:center;margin-bottom:12px;">${hint}</p>
    <div class="wd-guesses">${guessHTML}</div>
    ${!solved && guesses.length < 6 ? `
    <div class="wd-input-row">
      <input class="wd-input" id="wd-input" maxlength="${len}" placeholder="${'?'.repeat(len)}" onkeydown="if(event.key==='Enter')submitWordGuess('${data.gid}')" />
      <button class="btn-modal primary" onclick="submitWordGuess('${data.gid}')" style="font-size:16px;padding:10px 16px;">GO</button>
    </div>` : ''}
  `, [{ label: 'Close', cls: 'secondary', fn: 'closeModal()' }]);

  if (!solved && guesses.length < 6) {
    setTimeout(() => { const el = document.getElementById('wd-input'); if (el) el.focus(); }, 50);
  }
}

function submitWordGuess(gid) {
  if (!gameState || gameState.gid !== gid) return;
  const input = document.getElementById('wd-input');
  if (!input) return;
  const guess = input.value.toUpperCase().trim();
  if (guess.length !== gameState.word.length) return;
  input.value = '';

  const solved = guess === gameState.word;
  gameState.guesses.push(guess);
  if (solved) gameState.solved = true;

  bc.postMessage({ type: 'game', game: 'wgGuess', gid, guess, sessionId: SESSION_ID, nick: myNick, color: myColor });
  if (solved) addSystemMsg(`${myNick} solved the word!`);
  else addSystemMsg(`${myNick} guessed: ${guess}`);
  updateWordGuessModal(gameState);
}

function updateRPSModal(data) {

function pickRPS(gid, choice) {

  gameState.choices[SESSION_ID] = choice;
  bc.postMessage({ type: 'game', game: 'rpsPick', gid, choice, sessionId: SESSION_ID, nick: myNick, color: myColor });

// --- BOMB PASS ---
function startBomb() {
  const onlineIds = Object.keys(users);
  if (onlineIds.length < 2) { addSystemMsg('Need at least 2 players for Bomb Pass!'); return; }
  
  const gid = 'bomb_' + Date.now();
  // Pick random starting holder (not self if possible)
  const others = onlineIds.filter(s => s !== SESSION_ID);
  const startHolder = others.length > 0 ? others[Math.floor(Math.random() * others.length)] : SESSION_ID;
  const timer = 15 + Math.floor(Math.random() * 20);
  const data = { type: 'game', game: 'bomb', gid, holder: startHolder, timer, startTime: Date.now(), exploded: false };
  gameState = data;
  bc.postMessage({ ...data, sessionId: SESSION_ID, nick: myNick, color: myColor });
  renderBomb(data);
  addSystemMsg(`💣 BOMB PASS started! ${timer}s fuse!`);
}

function renderBomb(data) {
  const holderUser = users[data.holder] || { nick: data.holder.slice(0,6), color: '#fff' };
  postGameCard('💣 BOMB PASS', `${holderUser.nick} is holding the bomb! Pass it fast!`, data.gid);
  updateBombModal(data);
}

function updateBombModal(data) {
  const holderUser = users[data.holder] || { nick: 'someone', color: '#fff' };
  const elapsed = (Date.now() - data.startTime) / 1000;
  const remaining = Math.max(0, data.timer - elapsed);
  const iHave = data.holder === SESSION_ID;

  showModal('💣 BOMB PASS', `
    <div style="text-align:center;margin:8px 0 16px;">
      <div style="font-size:64px;animation:${iHave?'bombShake 0.3s infinite':'none'}">${data.exploded ? '💥' : '💣'}</div>
      <p style="font-family:'Bebas Neue',sans-serif;font-size:24px;color:${iHave?'var(--accent2)':'var(--muted)'};">${data.exploded ? 'BOOM!' : iHave ? 'YOU HAVE THE BOMB!' : `${escHtml(holderUser.nick)} has the bomb`}</p>
      ${!data.exploded ? `<div id="bomb-timer" style="font-family:'Space Mono',monospace;font-size:32px;color:${remaining<5?'var(--accent2)':'var(--accent)'};margin:8px 0;">${Math.ceil(remaining)}s</div>` : ''}
    </div>
    ${iHave && !data.exploded ? `
    <p style="font-size:13px;color:var(--muted);text-align:center;margin-bottom:12px;">Pass it to someone:</p>
    <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;">
      ${Object.entries(users).filter(([s]) => s !== SESSION_ID).map(([sid, u]) =>
        `<button class="btn-modal secondary" onclick="passBomb('${data.gid}','${sid}')" style="color:${u.color};border-color:${u.color}20;">${escHtml(u.nick)}</button>`
      ).join('')}
    </div>` : ''}
  `, [{ label: 'Close', cls: 'secondary', fn: 'closeModal()' }]);

  if (!data.exploded) {
    const interval = setInterval(() => {
      if (!gameState || gameState.gid !== data.gid || gameState.exploded) { clearInterval(interval); return; }
      const el = document.getElementById('bomb-timer');
      if (!el) { clearInterval(interval); return; }
      const elapsed2 = (Date.now() - gameState.startTime) / 1000;
      const rem = Math.max(0, gameState.timer - elapsed2);
      el.textContent = Math.ceil(rem) + 's';
      el.style.color = rem < 5 ? 'var(--accent2)' : 'var(--accent)';
      if (rem <= 0) {
        clearInterval(interval);
        if (gameState.holder === SESSION_ID) {
          gameState.exploded = true;
          bc.postMessage({ type: 'game', game: 'bombExplode', gid: data.gid, victim: SESSION_ID, sessionId: SESSION_ID, nick: myNick, color: myColor });
          addSystemMsg(`💥 ${myNick}'s bomb EXPLODED!`);
          updateBombModal(gameState);
        }
      }
    }, 200);
  }
}

function passBomb(gid, targetId) {
  if (!gameState || gameState.gid !== gid) return;
  if (gameState.holder !== SESSION_ID) return;
  gameState.holder = targetId;
  const targetUser = users[targetId] || { nick: targetId.slice(0,6) };
  bc.postMessage({ type: 'game', game: 'bombPass', gid, newHolder: targetId, sessionId: SESSION_ID, nick: myNick, color: myColor });
  addSystemMsg(`${myNick} passed the bomb to ${targetUser.nick}!`);
  updateBombModal(gameState);
}

// --- INCOMING GAME EVENTS ---
function handleIncomingGame(d) {
  users[d.sessionId] = { nick: d.nick, color: d.color, lastSeen: Date.now() };

  if (d.game === 'trivia') {
    gameState = d;
    renderTrivia(d);
  }
  else if (d.game === 'triviaAnswer') {
    if (gameState && gameState.gid === d.gid) {
      gameState.answers[d.sessionId] = d.idx;
      addSystemMsg(`${d.nick} answered the trivia`);
    }
  }
  else if (d.game === 'poll') {
    gameState = d;
    renderPoll(d);
  }
  else if (d.game === 'pollVote') {
    if (gameState && gameState.gid === d.gid) {
      gameState.votes[d.sessionId] = d.idx;
      addSystemMsg(`${d.nick} voted`);
      // Refresh if modal open
      if (document.getElementById('modal-overlay').classList.contains('open')) {
        updatePollModal(gameState);
      }
    }
  }
  else if (d.game === 'wordguess') {
    gameState = d;
    renderWordGuess(d);
  }
  else if (d.game === 'wgGuess') {
    if (gameState && gameState.gid === d.gid) {
      gameState.guesses.push(d.guess);
      if (d.guess === gameState.word) gameState.solved = true;
      addSystemMsg(`${d.nick} guessed: ${d.guess}${d.guess === gameState.word ? ' 🎉' : ''}`);
      if (document.getElementById('modal-overlay').classList.contains('open')) {
        updateWordGuessModal(gameState);
      }
    }
  }
  else if (d.game === 'rps') {
    gameState = d;
    renderRPS(d);
  }
  else if (d.game === 'rpsPick') {
    if (gameState && gameState.gid === d.gid) {
      gameState.choices[d.sessionId] = d.choice;
      addSystemMsg(`${d.nick} picked!`);
      if (document.getElementById('modal-overlay').classList.contains('open')) {
        updateRPSModal(gameState);
      }
    }
  }
  else if (d.game === 'bomb') {
    gameState = d;
    renderBomb(d);
  }
  else if (d.game === 'bombPass') {
    if (gameState && gameState.gid === d.gid) {
      gameState.holder = d.newHolder;
      const newHolder = users[d.newHolder] || { nick: 'someone' };
      addSystemMsg(`${d.nick} passed the bomb to ${newHolder.nick}!`);
      if (document.getElementById('modal-overlay').classList.contains('open')) {
        updateBombModal(gameState);
      }
    }
  }
  else if (d.game === 'bombExplode') {
    if (gameState && gameState.gid === d.gid) {
      gameState.exploded = true;
      addSystemMsg(`💥 ${d.nick}'s bomb EXPLODED!`);
      if (document.getElementById('modal-overlay').classList.contains('open')) {
        updateBombModal(gameState);
      }
    }
  }
}

// ===================== GAME CARD IN CHAT =====================
function postGameCard(title, body, gid) {
  const container = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'msg-game';
  el.innerHTML = `<div class="game-header">${title}</div><div>${body}</div>`;
  container.appendChild(el);
  scrollToBottom();
}

// ===================== MODAL HELPERS =====================
function showModal(title, body, actions) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  const actEl = document.getElementById('modal-actions');
  actEl.innerHTML = actions.map(a =>
    `<button class="btn-modal ${a.cls}" onclick="${a.fn}">${a.label}</button>`
  ).join('');
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

// ===================== UTILS =====================
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatTime(ts) {
  return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
