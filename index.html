<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChudChat2</title>
<script src="https://js.pusher.com/8.4/pusher.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #00ff88;
    --accent2: #ff3366;
    --accent3: #7b5cff;
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --online: #00ff88;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  body::after {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(123,92,255,0.08) 0%, transparent 70%);
    top: -200px; right: -200px;
    pointer-events: none;
    z-index: 0;
  }

  /* ============ ENTRY ============ */
  #entry {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }

  .entry-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(64px, 12vw, 120px);
    letter-spacing: 6px;
    line-height: 0.9;
    text-align: center;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent3) 50%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: logoGlow 3s ease-in-out infinite alternate;
    margin-bottom: 8px;
  }

  @keyframes logoGlow {
    from { filter: drop-shadow(0 0 20px rgba(0,255,136,0.3)); }
    to   { filter: drop-shadow(0 0 40px rgba(123,92,255,0.6)); }
  }

  .entry-tagline {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 48px;
  }

  .entry-form {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 320px;
  }

  .entry-form input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 14px 20px;
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    outline: none;
    border-radius: 4px;
    transition: border-color 0.2s, box-shadow 0.2s;
    text-align: center;
    letter-spacing: 2px;
  }

  .entry-form input::placeholder { color: var(--muted); letter-spacing: 1px; }
  .entry-form input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,255,136,0.1);
  }

  .btn-enter {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 14px 20px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    cursor: pointer;
    border-radius: 4px;
    transition: transform 0.1s, box-shadow 0.2s;
  }

  .btn-enter:hover { transform: translateY(-1px); box-shadow: 0 8px 30px rgba(0,255,136,0.4); }
  .btn-enter:active { transform: translateY(0); }
  .btn-enter:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .entry-note {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-top: 12px;
    font-family: 'Space Mono', monospace;
    line-height: 1.6;
  }

  #entry-error {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    text-align: center;
    min-height: 16px;
  }

  /* ============ APP ============ */
  #app {
    display: none;
    height: 100vh;
    grid-template-columns: 240px 1fr;
    grid-template-rows: 56px 1fr;
    position: relative;
    z-index: 1;
  }

  #app.visible { display: grid; }

  header {
    grid-column: 1 / -1;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
  }

  .header-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-divider { width: 1px; height: 24px; background: var(--border); }

  .header-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .pulse-dot {
    width: 8px; height: 8px;
    background: var(--online);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  .pulse-dot.disconnected { background: var(--accent2); animation: none; }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(0,255,136,0.4); }
    50% { box-shadow: 0 0 0 6px rgba(0,255,136,0); }
  }

  .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }

  .my-nick {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    background: rgba(0,255,136,0.08);
    padding: 4px 10px;
    border-radius: 3px;
    border: 1px solid rgba(0,255,136,0.2);
  }

  aside {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-section { padding: 16px; border-bottom: 1px solid var(--border); }

  .sidebar-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .games-list { display: flex; flex-direction: column; gap: 6px; }

  .game-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    border-radius: 4px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: all 0.15s;
    text-align: left;
  }

  .game-btn:hover { border-color: var(--accent3); background: rgba(123,92,255,0.1); transform: translateX(2px); }
  .game-icon { font-size: 18px; }

  #users-list { flex: 1; overflow-y: auto; padding: 16px; }

  .user-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    font-size: 13px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .user-avatar {
    width: 28px; height: 28px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    color: #000;
    flex-shrink: 0;
  }

  .user-name.is-me { color: var(--accent); }

  main { display: flex; flex-direction: column; overflow: hidden; }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    gap: 12px;
    padding: 6px 8px;
    border-radius: 4px;
    transition: background 0.1s;
    animation: msgIn 0.2s ease-out;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg:hover { background: rgba(255,255,255,0.03); }

  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    color: #000;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg-body { flex: 1; min-width: 0; }

  .msg-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 3px; }

  .msg-name { font-weight: 600; font-size: 14px; }

  .msg-time { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); }

  .msg-text { font-size: 14px; line-height: 1.5; color: #cccce0; word-break: break-word; }

  .msg-system {
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    padding: 8px;
  }

  .msg-game {
    background: rgba(123,92,255,0.06);
    border: 1px solid rgba(123,92,255,0.2);
    border-radius: 8px;
    padding: 12px 16px;
    margin: 4px 0;
    font-size: 13px;
  }

  .msg-game .game-header {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    color: var(--accent3);
    margin-bottom: 8px;
  }

  .input-bar {
    padding: 16px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
  }

  #msg-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    border-radius: 4px;
    transition: border-color 0.2s, box-shadow 0.2s;
    height: 44px;
  }

  #msg-input::placeholder { color: var(--muted); }
  #msg-input:focus { border-color: var(--accent3); box-shadow: 0 0 0 3px rgba(123,92,255,0.1); }

  .btn-send {
    background: var(--accent3);
    color: #fff;
    border: none;
    width: 44px; height: 44px;
    font-size: 18px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .btn-send:hover { background: #9575ff; transform: scale(1.05); }

  /* ============ MODAL ============ */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 440px;
    max-width: 95vw;
    max-height: 80vh;
    overflow-y: auto;
    padding: 24px;
    animation: modalIn 0.2s ease-out;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.96) translateY(10px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; color: var(--accent3); margin-bottom: 16px; }
  .modal-body { font-size: 14px; line-height: 1.6; color: #aaa; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }

  .btn-modal {
    padding: 10px 20px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-modal.primary { background: var(--accent); color: #000; }
  .btn-modal.secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-modal.danger { background: var(--accent2); color: #fff; }
  .btn-modal:hover { transform: translateY(-1px); filter: brightness(1.1); }

  .trivia-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }

  .trivia-opt {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    font-size: 13px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
    text-align: left;
  }

  .trivia-opt:hover { border-color: var(--accent3); background: rgba(123,92,255,0.15); }
  .trivia-opt.correct { border-color: var(--accent); background: rgba(0,255,136,0.15); color: var(--accent); }
  .trivia-opt.wrong { border-color: var(--accent2); background: rgba(255,51,102,0.15); color: var(--accent2); }

  .poll-options { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }

  .poll-opt {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 12px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .poll-opt:hover:not(.voted) { border-color: var(--accent3); }
  .poll-bar { position: absolute; left: 0; top: 0; bottom: 0; background: rgba(123,92,255,0.15); transition: width 0.4s ease; pointer-events: none; }
  .poll-label { position: relative; z-index: 1; }
  .poll-count { position: relative; z-index: 1; font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }

  .wd-display { font-family: 'Space Mono', monospace; font-size: 28px; letter-spacing: 12px; color: var(--accent); text-align: center; margin: 16px 0; }
  .wd-input-row { display: flex; gap: 8px; margin-top: 12px; }

  .wd-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    outline: none;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .wd-input:focus { border-color: var(--accent); }
  .wd-guesses { margin-top: 12px; display: flex; flex-direction: column; gap: 4px; }
  .wd-guess-row { display: flex; gap: 4px; justify-content: center; }

  .wd-cell {
    width: 36px; height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    border-radius: 3px;
    border: 1px solid var(--border);
  }

  .wd-cell.hit { background: rgba(0,255,136,0.25); border-color: var(--accent); color: var(--accent); }
  .wd-cell.close { background: rgba(255,185,0,0.2); border-color: #ffb900; color: #ffb900; }
  .wd-cell.miss { background: rgba(255,255,255,0.05); color: var(--muted); }

  .modal::-webkit-scrollbar { width: 4px; }
  .modal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @media (max-width: 600px) {
    #app.visible { grid-template-columns: 1fr; }
    aside { display: none; }
  }

  @keyframes bombShake { 0%,100%{transform:rotate(-5deg)} 50%{transform:rotate(5deg)} }
</style>
</head>
<body>

<!-- ENTRY -->
<div id="entry">
  <div class="entry-logo">ChudChat<span style="color:#ff3366">2</span></div>
  <div class="entry-tagline">ephemeral · real-time · disappears when empty</div>
  <div class="entry-form">
    <input type="text" id="nick-input" placeholder="your nickname" maxlength="20" autocomplete="off" />
    <button class="btn-enter" id="enter-btn" onclick="enterChat()">ENTER THE VOID</button>
    <div id="entry-error"></div>
  </div>
  <div class="entry-note">⚡ No accounts. No history.<br>All messages vanish when everyone leaves.</div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="header-logo">ChudChat2</div>
    <div class="header-divider"></div>
    <div class="header-status">
      <div class="pulse-dot" id="conn-dot"></div>
      <span id="online-count">connecting...</span>
    </div>
    <div class="header-right">
      <span class="my-nick" id="my-nick-display"></span>
    </div>
  </header>

  <aside>
    <div class="sidebar-section">
      <div class="sidebar-label">Mini Games</div>
      <div class="games-list">
        <button class="game-btn" onclick="launchGame('trivia')"><span class="game-icon">🧠</span> Trivia Drop</button>
        <button class="game-btn" onclick="launchGame('poll')"><span class="game-icon">📊</span> Quick Poll</button>
        <button class="game-btn" onclick="launchGame('wordguess')"><span class="game-icon">🔤</span> Word Guess</button>
        <button class="game-btn" onclick="launchGame('rps')"><span class="game-icon">✊</span> Rock Paper Scissors</button>
        <button class="game-btn" onclick="launchGame('bomb')"><span class="game-icon">💣</span> Bomb Pass</button>
      </div>
    </div>
    <div class="sidebar-label" style="padding:16px 16px 8px;">Online</div>
    <div id="users-list"></div>
  </aside>

  <main>
    <div id="messages">
      <div class="msg-system">⚡ Welcome to ChudChat2 — messages disappear when everyone leaves</div>
    </div>
    <div class="input-bar">
      <input type="text" id="msg-input" placeholder="say something..." maxlength="500" autocomplete="off" />
      <button class="btn-send" onclick="sendMessage()">➤</button>
    </div>
  </main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modal">
    <div class="modal-title" id="modal-title">Game</div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<script>
// ===================== CONFIG =====================
// Pusher key injected at runtime from env via a meta tag or window global.
// For Vercel: set PUSHER_KEY and PUSHER_CLUSTER as env vars,
// then expose them via a /api/config endpoint (see api/config.js).
// We fetch config from the server at startup.

const SESSION_ID = Math.random().toString(36).slice(2, 10);
let myNick = '';
let myColor = '';
const COLORS = ['#00ff88','#ff3366','#7b5cff','#ff9500','#00d4ff','#ff6ec7','#aaff00','#ff4500'];

let pusher = null;
let channel = null;
let users = {};
let gameState = {};

// ===================== PUSHER INIT =====================
async function initPusher() {
  try {
    const res = await fetch('/api/config');
    if (!res.ok) throw new Error('Config fetch failed');
    const cfg = await res.json();

    pusher = new Pusher(cfg.key, {
      cluster: cfg.cluster,
      forceTLS: true,
    });

    channel = pusher.subscribe('chudchat2');

    channel.bind('pusher:subscription_succeeded', () => {
      document.getElementById('conn-dot').classList.remove('disconnected');
    });

    channel.bind('chat', onChat);
    channel.bind('join', onJoin);
    channel.bind('leave', onLeave);
    channel.bind('heartbeat', onHeartbeat);
    channel.bind('game', onGame);

    pusher.connection.bind('disconnected', () => {
      document.getElementById('conn-dot').classList.add('disconnected');
      document.getElementById('online-count').textContent = 'disconnected';
    });

    pusher.connection.bind('connected', () => {
      document.getElementById('conn-dot').classList.remove('disconnected');
    });

    return true;
  } catch (err) {
    console.error('Pusher init error:', err);
    return false;
  }
}

// ===================== SEND TO SERVER =====================
async function publish(event, data) {
  try {
    await fetch('/api/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ event, data: { ...data, sessionId: SESSION_ID } })
    });
  } catch (err) {
    console.error('Publish error:', err);
  }
}

// ===================== ENTRY =====================
document.getElementById('nick-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') enterChat();
});

async function enterChat() {
  const raw = document.getElementById('nick-input').value.trim();
  if (!raw) {
    document.getElementById('nick-input').style.borderColor = '#ff3366';
    document.getElementById('entry-error').textContent = 'Pick a nickname first';
    return;
  }

  const btn = document.getElementById('enter-btn');
  btn.disabled = true;
  btn.textContent = 'CONNECTING...';
  document.getElementById('entry-error').textContent = '';

  const ok = await initPusher();
  if (!ok) {
    document.getElementById('entry-error').textContent = '⚠ Connection failed. Check your Pusher config.';
    btn.disabled = false;
    btn.textContent = 'ENTER THE VOID';
    return;
  }

  myNick = raw.slice(0, 20);
  myColor = COLORS[Math.floor(Math.random() * COLORS.length)];
  users[SESSION_ID] = { nick: myNick, color: myColor, lastSeen: Date.now() };

  document.getElementById('entry').style.opacity = '0';
  document.getElementById('entry').style.transition = 'opacity 0.4s';
  setTimeout(() => {
    document.getElementById('entry').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    document.getElementById('my-nick-display').textContent = myNick;
  }, 400);

  publish('join', { nick: myNick, color: myColor });
  renderUsers();
  setupHeartbeat();

  document.getElementById('msg-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); sendMessage(); }
  });
}

// ===================== EVENT HANDLERS =====================
function onChat(d) {
  if (d.sessionId === SESSION_ID) return;
  users[d.sessionId] = { nick: d.nick, color: d.color, lastSeen: Date.now() };
  appendMessage(d);
  renderUsers();
}

function onJoin(d) {
  if (d.sessionId === SESSION_ID) return;
  users[d.sessionId] = { nick: d.nick, color: d.color, lastSeen: Date.now() };
  addSystemMsg(`${d.nick} joined`);
  renderUsers();
}

function onLeave(d) {
  if (d.sessionId === SESSION_ID) return;
  const u = users[d.sessionId];
  if (u) {
    addSystemMsg(`${u.nick} left`);
    delete users[d.sessionId];
    renderUsers();
  }
}

function onHeartbeat(d) {
  if (d.sessionId === SESSION_ID) return;
  if (users[d.sessionId]) {
    users[d.sessionId].lastSeen = Date.now();
  } else {
    users[d.sessionId] = { nick: d.nick, color: d.color, lastSeen: Date.now() };
    renderUsers();
  }
}

function onGame(d) {
  if (d.sessionId === SESSION_ID) return;
  handleIncomingGame(d);
}

// ===================== HEARTBEAT =====================
function setupHeartbeat() {
  setInterval(() => {
    publish('heartbeat', { nick: myNick, color: myColor });
    const now = Date.now();
    let changed = false;
    Object.keys(users).forEach(sid => {
      if (sid !== SESSION_ID && now - users[sid].lastSeen > 12000) {
        addSystemMsg(`${users[sid].nick} disconnected`);
        delete users[sid];
        changed = true;
      }
    });
    if (changed) renderUsers();
  }, 4000);
}

window.addEventListener('beforeunload', () => {
  publish('leave', { nick: myNick });
});

// ===================== MESSAGING =====================
function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  const msg = {
    id: SESSION_ID + '_' + Date.now(),
    nick: myNick,
    color: myColor,
    text,
    ts: Date.now(),
  };

  appendMessage({ ...msg, sessionId: SESSION_ID }, true);
  publish('chat', msg);
}

function appendMessage(msg, isMine = false) {
  const container = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'msg';
  const initials = msg.nick.slice(0, 2).toUpperCase();
  el.innerHTML = `
    <div class="msg-avatar" style="background:${msg.color}">${initials}</div>
    <div class="msg-body">
      <div class="msg-header">
        <span class="msg-name" style="color:${msg.color}">${escHtml(msg.nick)}</span>
        <span class="msg-time">${formatTime(msg.ts)}</span>
      </div>
      <div class="msg-text">${escHtml(msg.text)}</div>
    </div>
  `;
  container.appendChild(el);
  scrollToBottom();
}

function addSystemMsg(text) {
  const container = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'msg-system';
  el.textContent = `— ${text} —`;
  container.appendChild(el);
  scrollToBottom();
}

function scrollToBottom() {
  const c = document.getElementById('messages');
  c.scrollTop = c.scrollHeight;
}

// ===================== USERS =====================
function renderUsers() {
  const list = document.getElementById('users-list');
  const count = Object.keys(users).length;
  document.getElementById('online-count').textContent = `${count} online`;

  list.innerHTML = '';
  Object.entries(users).forEach(([sid, u]) => {
    const div = document.createElement('div');
    div.className = 'user-item';
    const isMe = sid === SESSION_ID;
    div.innerHTML = `
      <div class="user-avatar" style="background:${u.color}">${u.nick.slice(0,2).toUpperCase()}</div>
      <span class="user-name ${isMe ? 'is-me' : ''}">${escHtml(u.nick)}${isMe ? ' (you)' : ''}</span>
    `;
    list.appendChild(div);
  });
}

// ===================== GAMES =====================
const TRIVIA_QUESTIONS = [
  { q: "What planet is closest to the Sun?", opts: ["Mercury","Venus","Earth","Mars"], a: 0 },
  { q: "How many sides does a hexagon have?", opts: ["5","6","7","8"], a: 1 },
  { q: "What's the capital of Japan?", opts: ["Seoul","Beijing","Tokyo","Bangkok"], a: 2 },
  { q: "What gas do plants absorb?", opts: ["Oxygen","Nitrogen","CO2","Hydrogen"], a: 2 },
  { q: "How many bones in the adult human body?", opts: ["196","206","216","226"], a: 1 },
  { q: "Who painted the Mona Lisa?", opts: ["Raphael","Van Gogh","da Vinci","Michelangelo"], a: 2 },
  { q: "What's the fastest land animal?", opts: ["Lion","Cheetah","Greyhound","Falcon"], a: 1 },
  { q: "What's the boiling point of water (°C)?", opts: ["90","95","100","105"], a: 2 },
  { q: "Which ocean is the largest?", opts: ["Atlantic","Indian","Arctic","Pacific"], a: 3 },
  { q: "How many colors in a rainbow?", opts: ["5","6","7","8"], a: 2 },
];

const WORD_LIST = ['SPARK','CRANE','FLINT','BLAZE','DRIFT','PRISM','GROVE','CHESS','FROST','PLUMB','SHARD','SWIFT','GRAZE','CRYPT','VENOM'];

function launchGame(type) {
  if (type === 'trivia') startTrivia();
  else if (type === 'poll') startPoll();
  else if (type === 'wordguess') startWordGuess();
  else if (type === 'rps') startRPS();
  else if (type === 'bomb') startBomb();
}

// --- TRIVIA ---
function startTrivia() {
  const q = TRIVIA_QUESTIONS[Math.floor(Math.random() * TRIVIA_QUESTIONS.length)];
  const gid = 'trivia_' + Date.now();
  const data = { game: 'trivia', gid, q, answers: {} };
  gameState = data;
  publish('game', data);
  renderTrivia(data);
}

function renderTrivia(data) {
  postGameCard('🧠 TRIVIA', `<strong>${escHtml(data.q.q)}</strong>`, data.gid);
  showModal('🧠 TRIVIA DROP', `
    <p style="margin-bottom:12px;font-size:15px;">${escHtml(data.q.q)}</p>
    <div class="trivia-options" id="trivia-opts-${data.gid}">
      ${data.q.opts.map((o, i) => `<button class="trivia-opt" onclick="answerTrivia('${data.gid}',${i})">${escHtml(o)}</button>`).join('')}
    </div>
    <p id="trivia-result-${data.gid}" style="margin-top:12px;font-size:13px;color:var(--muted);"></p>
  `, [{ label: 'Close', cls: 'secondary', fn: 'closeModal()' }]);
}

function answerTrivia(gid, idx) {
  if (!gameState || gameState.gid !== gid) return;
  if (gameState.answers && gameState.answers[SESSION_ID] !== undefined) return;
  gameState.answers[SESSION_ID] = idx;
  publish('game', { game: 'triviaAnswer', gid, idx });

  const correct = gameState.q.a;
  document.querySelectorAll(`#trivia-opts-${gid} .trivia-opt`).forEach((el, i) => {
    el.disabled = true;
    if (i === correct) el.classList.add('correct');
    else if (i === idx && idx !== correct) el.classList.add('wrong');
  });
  const result = document.getElementById(`trivia-result-${gid}`);
  if (result) {
    result.textContent = idx === correct ? '✅ Correct!' : `❌ Wrong! Answer: ${gameState.q.opts[correct]}`;
    result.style.color = idx === correct ? '#00ff88' : '#ff3366';
  }
  addSystemMsg(`${myNick} answered the trivia`);
}

// --- POLL ---
function startPoll() {
  showModal('📊 QUICK POLL', `
    <p style="margin-bottom:12px;">What's your poll question?</p>
    <input id="poll-q" style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:4px;font-size:13px;outline:none;margin-bottom:8px;" placeholder="Poll question..." maxlength="100" />
    <input id="poll-a" style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:4px;font-size:13px;outline:none;margin-bottom:8px;" placeholder="Option 1" maxlength="40" />
    <input id="poll-b" style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:4px;font-size:13px;outline:none;" placeholder="Option 2" maxlength="40" />
  `, [
    { label: 'Launch Poll', cls: 'primary', fn: 'launchPoll()' },
    { label: 'Cancel', cls: 'secondary', fn: 'closeModal()' }
  ]);
}

function launchPoll() {
  const q = document.getElementById('poll-q').value.trim();
  const a = document.getElementById('poll-a').value.trim();
  const b = document.getElementById('poll-b').value.trim();
  if (!q || !a || !b) return;
  const gid = 'poll_' + Date.now();
  const data = { game: 'poll', gid, q, opts: [a, b], votes: {} };
  gameState = data;
  publish('game', data);
  renderPoll(data);
}

function renderPoll(data) {
  postGameCard('📊 POLL', escHtml(data.q), data.gid);
  updatePollModal(data);
}

function updatePollModal(data) {
  const total = Object.keys(data.votes || {}).length;
  const counts = [0, 0];
  Object.values(data.votes || {}).forEach(v => counts[v]++);
  showModal('📊 QUICK POLL', `
    <p style="margin-bottom:12px;font-size:15px;">${escHtml(data.q)}</p>
    <div class="poll-options">
      ${data.opts.map((o, i) => {
        const pct = total > 0 ? Math.round(counts[i]/total*100) : 0;
        const voted = data.votes && data.votes[SESSION_ID] !== undefined;
        return `<div class="poll-opt ${voted ? 'voted' : ''}" onclick="votePoll('${data.gid}',${i})">
          <div class="poll-bar" style="width:${pct}%"></div>
          <span class="poll-label">${escHtml(o)}</span>
          <span class="poll-count">${voted ? pct+'%' : ''}</span>
        </div>`;
      }).join('')}
    </div>
    <p style="margin-top:10px;font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;">${total} vote${total !== 1 ? 's' : ''}</p>
  `, [{ label: 'Close', cls: 'secondary', fn: 'closeModal()' }]);
}

function votePoll(gid, idx) {
  if (!gameState || gameState.gid !== gid) return;
  if (gameState.votes && gameState.votes[SESSION_ID] !== undefined) return;
  gameState.votes[SESSION_ID] = idx;
  publish('game', { game: 'pollVote', gid, idx });
  addSystemMsg(`${myNick} voted`);
  updatePollModal(gameState);
}

// --- WORD GUESS ---
function startWordGuess() {
  const word = WORD_LIST[Math.floor(Math.random() * WORD_LIST.length)];
  const gid = 'wg_' + Date.now();
  const data = { game: 'wordguess', gid, word, guesses: [], solved: false };
  gameState = data;
  publish('game', data);
  renderWordGuess(data);
}

function renderWordGuess(data) {
  postGameCard('🔤 WORD GUESS', `Guess the ${data.word.length}-letter word!`, data.gid);
  updateWordGuessModal(data);
}

function updateWordGuessModal(data) {
  const guesses = data.guesses || [];
  const solved = data.solved;
  const len = data.word.length;

  let guessHTML = guesses.map(g => {
    let row = '';
    for (let i = 0; i < len; i++) {
      let cls = 'miss';
      if (g[i] === data.word[i]) cls = 'hit';
      else if (data.word.includes(g[i])) cls = 'close';
      row += `<div class="wd-cell ${cls}">${g[i]}</div>`;
    }
    return `<div class="wd-guess-row">${row}</div>`;
  }).join('');

  for (let i = guesses.length; i < 6; i++) {
    guessHTML += `<div class="wd-guess-row">${Array(len).fill('<div class="wd-cell"></div>').join('')}</div>`;
  }

  const hint = solved ? `🎉 Solved! Word was: <strong style="color:var(--accent)">${data.word}</strong>` :
    guesses.length >= 6 ? `😞 Out of guesses! Word was: <strong style="color:var(--accent2)">${data.word}</strong>` :
    `Guess ${guesses.length + 1}/6 — 🟩 right spot  🟨 wrong spot`;

  showModal('🔤 WORD GUESS', `
    <div class="wd-display">${'_ '.repeat(len).trim()}</div>
    <p style="font-size:12px;color:var(--muted);text-align:center;margin-bottom:12px;">${hint}</p>
    <div class="wd-guesses">${guessHTML}</div>
    ${!solved && guesses.length < 6 ? `
    <div class="wd-input-row">
      <input class="wd-input" id="wd-input" maxlength="${len}" placeholder="${'?'.repeat(len)}" onkeydown="if(event.key==='Enter')submitWordGuess('${data.gid}')" />
      <button class="btn-modal primary" onclick="submitWordGuess('${data.gid}')" style="font-size:16px;padding:10px 16px;">GO</button>
    </div>` : ''}
  `, [{ label: 'Close', cls: 'secondary', fn: 'closeModal()' }]);

  if (!solved && guesses.length < 6) {
    setTimeout(() => { const el = document.getElementById('wd-input'); if (el) el.focus(); }, 50);
  }
}

function submitWordGuess(gid) {
  if (!gameState || gameState.gid !== gid) return;
  const input = document.getElementById('wd-input');
  if (!input) return;
  const guess = input.value.toUpperCase().trim();
  if (guess.length !== gameState.word.length) return;
  input.value = '';
  const solved = guess === gameState.word;
  gameState.guesses.push(guess);
  if (solved) gameState.solved = true;
  publish('game', { game: 'wgGuess', gid, guess });
  if (solved) addSystemMsg(`${myNick} solved the word! 🎉`);
  else addSystemMsg(`${myNick} guessed: ${guess}`);
  updateWordGuessModal(gameState);
}

// --- RPS ---
const RPS_LABELS = { r: '✊ Rock', p: '✋ Paper', s: '✌️ Scissors' };

function startRPS() {
  const gid = 'rps_' + Date.now();
  const data = { game: 'rps', gid, choices: {} };
  gameState = data;
  publish('game', data);
  renderRPS(data);
  addSystemMsg(`${myNick} started Rock Paper Scissors!`);
}

function renderRPS(data) {
  postGameCard('✊ RPS', 'Rock Paper Scissors — everyone pick!', data.gid);
  updateRPSModal(data);
}

function updateRPSModal(data) {
  const picked = data.choices && data.choices[SESSION_ID];
  const total = Object.keys(data.choices || {}).length;
  const onlineCount = Object.keys(users).length;

  showModal('✊ ROCK PAPER SCISSORS', `
    <p style="color:var(--muted);font-size:13px;margin-bottom:16px;">${total} / ${onlineCount} players picked</p>
    ${!picked ? `
    <div style="display:flex;gap:10px;justify-content:center;">
      <button onclick="pickRPS('${data.gid}','r')" style="font-size:32px;padding:16px 24px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;cursor:pointer;transition:all 0.15s;" onmouseover="this.style.borderColor='var(--accent3)'" onmouseout="this.style.borderColor='var(--border)'">✊</button>
      <button onclick="pickRPS('${data.gid}','p')" style="font-size:32px;padding:16px 24px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;cursor:pointer;transition:all 0.15s;" onmouseover="this.style.borderColor='var(--accent3)'" onmouseout="this.style.borderColor='var(--border)'">✋</button>
      <button onclick="pickRPS('${data.gid}','s')" style="font-size:32px;padding:16px 24px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;cursor:pointer;transition:all 0.15s;" onmouseover="this.style.borderColor='var(--accent3)'" onmouseout="this.style.borderColor='var(--border)'">✌️</button>
    </div>` : `<p style="text-align:center;font-size:32px;margin:12px 0;">${RPS_LABELS[picked]}</p><p style="text-align:center;color:var(--muted);font-size:13px;">Waiting for others...</p>`}
    ${total >= 2 ? `<div style="border-top:1px solid var(--border);padding-top:12px;margin-top:12px;">${
      Object.entries(data.choices).map(([sid, c]) => {
        const u = users[sid] || { nick: sid.slice(0,6), color: '#fff' };
        return `<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px;"><span style="color:${u.color}">${escHtml(u.nick)}</span><span>${RPS_LABELS[c]||c}</span></div>`;
      }).join('')
    }</div>` : ''}
  `, [{ label: 'Close', cls: 'secondary', fn: 'closeModal()' }]);
}

function pickRPS(gid, choice) {
  if (!gameState || gameState.gid !== gid) return;
  if (gameState.choices && gameState.choices[SESSION_ID]) return;
  gameState.choices[SESSION_ID] = choice;
  publish('game', { game: 'rpsPick', gid, choice });
  addSystemMsg(`${myNick} picked!`);
  updateRPSModal(gameState);
}

// --- BOMB PASS ---
function startBomb() {
  const onlineIds = Object.keys(users);
  if (onlineIds.length < 2) { addSystemMsg('Need at least 2 players for Bomb Pass!'); return; }
  const others = onlineIds.filter(s => s !== SESSION_ID);
  const startHolder = others[Math.floor(Math.random() * others.length)];
  const timer = 15 + Math.floor(Math.random() * 20);
  const gid = 'bomb_' + Date.now();
  const data = { game: 'bomb', gid, holder: startHolder, timer, startTime: Date.now(), exploded: false };
  gameState = data;
  publish('game', data);
  renderBomb(data);
  addSystemMsg(`💣 BOMB PASS started! ${timer}s fuse!`);
}

function renderBomb(data) {
  const holderUser = users[data.holder] || { nick: 'someone', color: '#fff' };
  postGameCard('💣 BOMB PASS', `${holderUser.nick} is holding the bomb!`, data.gid);
  updateBombModal(data);
}

function updateBombModal(data) {
  const holderUser = users[data.holder] || { nick: 'someone', color: '#fff' };
  const elapsed = (Date.now() - data.startTime) / 1000;
  const remaining = Math.max(0, data.timer - elapsed);
  const iHave = data.holder === SESSION_ID;

  showModal('💣 BOMB PASS', `
    <div style="text-align:center;margin:8px 0 16px;">
      <div style="font-size:64px;${iHave && !data.exploded ? 'animation:bombShake 0.3s infinite' : ''}">${data.exploded ? '💥' : '💣'}</div>
      <p style="font-family:'Bebas Neue',sans-serif;font-size:24px;color:${iHave?'var(--accent2)':'var(--muted)'};">${data.exploded ? 'BOOM!' : iHave ? 'YOU HAVE THE BOMB!' : `${escHtml(holderUser.nick)} has the bomb`}</p>
      ${!data.exploded ? `<div id="bomb-timer" style="font-family:'Space Mono',monospace;font-size:32px;color:${remaining<5?'var(--accent2)':'var(--accent)'};margin:8px 0;">${Math.ceil(remaining)}s</div>` : ''}
    </div>
    ${iHave && !data.exploded ? `
    <p style="font-size:13px;color:var(--muted);text-align:center;margin-bottom:12px;">Pass it to someone:</p>
    <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;">
      ${Object.entries(users).filter(([s]) => s !== SESSION_ID).map(([sid, u]) =>
        `<button class="btn-modal secondary" onclick="passBomb('${data.gid}','${sid}')" style="color:${u.color};">${escHtml(u.nick)}</button>`
      ).join('')}
    </div>` : ''}
  `, [{ label: 'Close', cls: 'secondary', fn: 'closeModal()' }]);

  if (!data.exploded) {
    const interval = setInterval(() => {
      if (!gameState || gameState.gid !== data.gid || gameState.exploded) { clearInterval(interval); return; }
      const el = document.getElementById('bomb-timer');
      if (!el) { clearInterval(interval); return; }
      const rem = Math.max(0, gameState.timer - (Date.now() - gameState.startTime) / 1000);
      el.textContent = Math.ceil(rem) + 's';
      el.style.color = rem < 5 ? 'var(--accent2)' : 'var(--accent)';
      if (rem <= 0) {
        clearInterval(interval);
        if (gameState.holder === SESSION_ID && !gameState.exploded) {
          gameState.exploded = true;
          publish('game', { game: 'bombExplode', gid: data.gid, victim: SESSION_ID });
          addSystemMsg(`💥 ${myNick}'s bomb EXPLODED!`);
          updateBombModal(gameState);
        }
      }
    }, 200);
  }
}

function passBomb(gid, targetId) {
  if (!gameState || gameState.gid !== gid || gameState.holder !== SESSION_ID) return;
  gameState.holder = targetId;
  const targetUser = users[targetId] || { nick: targetId.slice(0,6) };
  publish('game', { game: 'bombPass', gid, newHolder: targetId });
  addSystemMsg(`${myNick} passed the bomb to ${targetUser.nick}!`);
  updateBombModal(gameState);
}

// ===================== INCOMING GAME HANDLER =====================
function handleIncomingGame(d) {
  if (d.game === 'trivia') { gameState = d; renderTrivia(d); }
  else if (d.game === 'triviaAnswer') {
    if (gameState && gameState.gid === d.gid) {
      gameState.answers[d.sessionId] = d.idx;
      addSystemMsg(`${users[d.sessionId]?.nick || 'Someone'} answered the trivia`);
    }
  }
  else if (d.game === 'poll') { gameState = d; renderPoll(d); }
  else if (d.game === 'pollVote') {
    if (gameState && gameState.gid === d.gid) {
      gameState.votes[d.sessionId] = d.idx;
      addSystemMsg(`${users[d.sessionId]?.nick || 'Someone'} voted`);
      if (document.getElementById('modal-overlay').classList.contains('open')) updatePollModal(gameState);
    }
  }
  else if (d.game === 'wordguess') { gameState = d; renderWordGuess(d); }
  else if (d.game === 'wgGuess') {
    if (gameState && gameState.gid === d.gid) {
      gameState.guesses.push(d.guess);
      if (d.guess === gameState.word) gameState.solved = true;
      addSystemMsg(`${users[d.sessionId]?.nick || 'Someone'} guessed: ${d.guess}${d.guess === gameState.word ? ' 🎉' : ''}`);
      if (document.getElementById('modal-overlay').classList.contains('open')) updateWordGuessModal(gameState);
    }
  }
  else if (d.game === 'rps') { gameState = d; renderRPS(d); }
  else if (d.game === 'rpsPick') {
    if (gameState && gameState.gid === d.gid) {
      gameState.choices[d.sessionId] = d.choice;
      addSystemMsg(`${users[d.sessionId]?.nick || 'Someone'} picked!`);
      if (document.getElementById('modal-overlay').classList.contains('open')) updateRPSModal(gameState);
    }
  }
  else if (d.game === 'bomb') { gameState = d; renderBomb(d); }
  else if (d.game === 'bombPass') {
    if (gameState && gameState.gid === d.gid) {
      gameState.holder = d.newHolder;
      const newHolder = users[d.newHolder] || { nick: 'someone' };
      addSystemMsg(`${users[d.sessionId]?.nick || 'Someone'} passed the bomb to ${newHolder.nick}!`);
      if (document.getElementById('modal-overlay').classList.contains('open')) updateBombModal(gameState);
    }
  }
  else if (d.game === 'bombExplode') {
    if (gameState && gameState.gid === d.gid) {
      gameState.exploded = true;
      addSystemMsg(`💥 ${users[d.sessionId]?.nick || 'Someone'}'s bomb EXPLODED!`);
      if (document.getElementById('modal-overlay').classList.contains('open')) updateBombModal(gameState);
    }
  }
}

// ===================== GAME CARD =====================
function postGameCard(title, body, gid) {
  const container = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'msg-game';
  el.innerHTML = `<div class="game-header">${title}</div><div>${body}</div>`;
  container.appendChild(el);
  scrollToBottom();
}

// ===================== MODAL =====================
function showModal(title, body, actions) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-actions').innerHTML = actions.map(a =>
    `<button class="btn-modal ${a.cls}" onclick="${a.fn}">${a.label}</button>`
  ).join('');
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function closeModalOutside(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }

// ===================== UTILS =====================
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatTime(ts) {
  return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
